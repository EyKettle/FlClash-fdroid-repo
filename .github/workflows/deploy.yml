name: deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'FlClash release version, for example 0.8.93 or v0.8.93'
        required: true
        type: string

env:
  APK_KEEP_COUNT: 5

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        name: Checkout

      - name: Prepare
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install aapt apksigner pipx -y
          pipx install fdroidserver
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fdroid --version

          # Prepare APK directory
          mkdir -p ./fdroid/repo/

          # Retain historical APKs from gh-pages
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages \
              "https://github.com/${GITHUB_REPOSITORY}.git" ./.previous-pages
            if [ -d ./.previous-pages/repo ]; then
              find ./.previous-pages/repo -maxdepth 1 \
                -name 'FlClash-*-android-*.apk' -exec cp {} ./fdroid/repo/ \;
            fi
          fi

          # Download all 3 ABIs from FlClash Release
          version="${{ inputs.version }}"
          version="${version#v}"
          for abi in arm64-v8a armeabi-v7a x86_64; do
            apk_url="https://github.com/EyKettle/FlClash/releases/download/v${version}/FlClash-${version}-android-${abi}.apk"
            curl --fail --location --retry 3 \
              --output "./fdroid/repo/FlClash-${version}-android-${abi}.apk" \
              "$apk_url" || echo "Warning: ${abi} APK not found, skipping"
          done

      - name: Build
        run: |
          cd ./fdroid/

          # Collect version info
          find ./repo -maxdepth 1 -name 'FlClash-*-android-*.apk' -print0 |
            while IFS= read -r -d '' apk; do
              vc=$(aapt dump badging "$apk" | grep versionCode | sed "s/.*versionCode='//; s/'.*//")
              vn=$(aapt dump badging "$apk" | grep versionName | sed "s/.*versionName='//; s/'.*//")
              printf '%s\t%s\t%s\n' "$vc" "$vn" "$apk"
            done | sort -rn > .apk-index

          awk -v keep="$APK_KEEP_COUNT" 'NR > keep { print $3 }' .apk-index | xargs -r rm -f

          read VC VN APK_PATH <<< $(head -1 .apk-index)
          if [ -z "$APK_PATH" ]; then
            echo "No FlClash APK found in ./fdroid/repo" >&2
            exit 1
          fi

          # Inject signing secrets
          sed -i 's/KEYALIAS/${{ secrets.KEY_ALIAS }}/g' config.yml
          sed -i 's/KEYSTOREPASS/${{ secrets.STORE_PASSWORD }}/g' config.yml
          sed -i 's/KEYPASS/${{ secrets.KEY_PASSWORD }}/g' config.yml
          sed -i 's/KEYDNAME/${{ secrets.KEY_DNAME }}/g' config.yml
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > keystore.keystore
          chmod 600 config.yml keystore.keystore

          if grep -qE 'KEYALIAS|KEYSTOREPASS|KEYPASS|KEYDNAME' config.yml; then
            echo "ERROR: Secrets placeholders not replaced — secrets may be missing" >&2
            exit 1
          fi

          # Update metadata
          sed -i "s/VERSIONCODE/$VC/g" ./metadata/com.follow.clash.yml
          sed -i "s/VERSION/$VN/g" ./metadata/com.follow.clash.yml

          # Build F-Droid index
          fdroid update --pretty --delete-unknown --use-date-from-apk
          rm config.yml keystore.keystore
          cd ..

      - name: Deploy
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          rm -rf ./.publish
          mkdir ./.publish
          cp -a ./fdroid/. ./.publish/

          rm -rf ./.publish-git
          git clone --no-checkout \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            ./.publish-git
          cd ./.publish-git
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          if git fetch origin gh-pages --depth 1; then
            git checkout FETCH_HEAD
            old_tree=$(git rev-parse HEAD^{tree})
            old_commit=$(printf 'Previous F-Droid repo snapshot\n' | git commit-tree "$old_tree")
            expected_remote=$(git rev-parse FETCH_HEAD)
          else
            old_commit=''
            expected_remote=''
          fi

          git rm -r --ignore-unmatch .
          cp -a ../.publish/. .
          git add -A
          new_tree=$(git write-tree)

          if [ -n "$old_commit" ]; then
            new_commit=$(printf 'Deploy F-Droid repo from %s\n' "$GITHUB_SHA" | \
              git commit-tree "$new_tree" -p "$old_commit")
            git push --force-with-lease=refs/heads/gh-pages:"$expected_remote" \
              origin "$new_commit":refs/heads/gh-pages
          else
            new_commit=$(printf 'Deploy F-Droid repo from %s\n' "$GITHUB_SHA" | \
              git commit-tree "$new_tree")
            git push origin "$new_commit":refs/heads/gh-pages
          fi
